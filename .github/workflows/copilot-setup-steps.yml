name: Copilot Setup Steps
on:
  push:
    branches: [ main ]
    paths: [ ".github/workflows/copilot-setup-steps.yml" ]
  pull_request:
    branches: [ main ]
    paths: [ ".github/workflows/copilot-setup-steps.yml" ]
  workflow_dispatch:

jobs:
  copilot-setup-steps:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup uv for Python
        uses: astral-sh/setup-uv@v5
        with:
          version: "latest"

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Install Backend Dependencies
        run: |
          cd backend
          uv venv
          uv pip install -r requirements.txt

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Install Frontend Dependencies
        run: |
          cd frontend
          npm install

      - name: Verify Environment
        run: |
          echo "Backend and Frontend environments are pre-configured for Copilot agents."
          cd backend && . .venv/bin/activate && pytest --version
          cd ../frontend && npm test -- --version
